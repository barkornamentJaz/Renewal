<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CertTrack — Certificates</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    :root {
      --navy:      #0d1b2a;
      --navy-mid:  #132237;
      --navy-soft: #1c3050;
      --amber:     #f4a826;
      --amber-dim: #c4841c;
      --teal:      #2ec4b6;
      --rose:      #e05c5c;
      --green:     #3ecf8e;
      --text:      #e8edf3;
      --text-dim:  #8a9ab5;
      --border:    rgba(255,255,255,0.07);
      --card:      rgba(255,255,255,0.04);
      --card-hover:rgba(255,255,255,0.07);
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,.35);
    }

    body { font-family:'DM Sans',sans-serif; background:var(--navy); color:var(--text); min-height:100vh; display:flex; }

    /* Sidebar */
    .sidebar { width:240px; min-height:100vh; background:var(--navy-mid); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; z-index:100; }
    .sidebar-logo { padding:28px 24px 20px; border-bottom:1px solid var(--border); }
    .sidebar-logo .brand { font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; color:var(--amber); }
    .sidebar-logo .tagline { font-size:.7rem; color:var(--text-dim); margin-top:2px; letter-spacing:.8px; text-transform:uppercase; }
    .nav { padding:16px 0; flex:1; }
    .nav-label { font-size:.65rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); padding:10px 24px 6px; }
    .nav-link { display:flex; align-items:center; gap:10px; padding:10px 24px; color:var(--text-dim); text-decoration:none; font-size:.88rem; border-left:3px solid transparent; transition:all .2s; }
    .nav-link:hover { color:var(--text); background:var(--card); }
    .nav-link.active { color:var(--amber); border-left-color:var(--amber); background:rgba(244,168,38,.07); }
    .nav-link .icon { font-size:1rem; width:18px; text-align:center; }
    .sidebar-footer { padding:16px 24px; border-top:1px solid var(--border); font-size:.72rem; color:var(--text-dim); }

    /* Main */
    .main { margin-left:240px; flex:1; min-height:100vh; padding:32px; }

    .page-header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:16px; }
    .page-title { font-family:'Syne',sans-serif; font-weight:700; font-size:1.8rem; }
    .page-subtitle { color:var(--text-dim); font-size:.85rem; margin-top:4px; }

    .btn { display:inline-flex; align-items:center; gap:8px; padding:10px 20px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:.85rem; font-weight:500; cursor:pointer; text-decoration:none; transition:all .2s; border:none; }
    .btn-primary { background:var(--amber); color:var(--navy); }
    .btn-primary:hover { background:var(--amber-dim); }
    .btn-sm { padding:6px 14px; font-size:.78rem; }
    .btn-ghost { background:transparent; color:var(--text-dim); border:1px solid var(--border); }
    .btn-ghost:hover { color:var(--text); }
    .btn-danger { background:rgba(224,92,92,.15); color:var(--rose); border:1px solid rgba(224,92,92,.2); }
    .btn-danger:hover { background:rgba(224,92,92,.25); }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .search-wrap input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px 9px 38px;
      color: var(--text);
      font-family: 'DM Sans',sans-serif;
      font-size: .88rem;
      outline: none;
      transition: all .2s;
    }
    .search-wrap input:focus { border-color:var(--amber); background:rgba(244,168,38,.07); }
    .search-wrap input::placeholder { color:var(--text-dim); }
    .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:.9rem; opacity:.5; }

    select.filter {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      color: var(--text);
      font-family: 'DM Sans',sans-serif;
      font-size: .85rem;
      outline: none;
      cursor: pointer;
      transition: all .2s;
    }
    select.filter:focus { border-color: var(--amber); }
    select.filter option { background: var(--navy-mid); }

    .result-count { font-size:.8rem; color:var(--text-dim); white-space:nowrap; }

    /* Table Card */
    .table-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .table-wrap { overflow-x:auto; }

    table { width:100%; border-collapse:collapse; font-size:.84rem; }
    thead tr { background:rgba(255,255,255,.03); }
    th {
      padding: 12px 16px;
      text-align: left;
      font-size: .7rem;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color .2s;
    }
    th:hover { color: var(--amber); }
    th .sort-icon { opacity:.4; font-size:.7rem; margin-left:3px; }
    th.sorted .sort-icon { opacity:1; color:var(--amber); }

    td { padding:14px 16px; border-top:1px solid var(--border); color:var(--text); vertical-align:middle; }
    tr:hover td { background:var(--card-hover); }

    .cert-name { font-weight:500; margin-bottom:2px; }
    .cert-sub  { font-size:.75rem; color:var(--text-dim); }

    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:.7rem; font-weight:500; letter-spacing:.3px; white-space:nowrap; }
    .badge-active  { background:rgba(62,207,142,.15); color:var(--green); }
    .badge-warning { background:rgba(244,168,38,.15);  color:var(--amber); }
    .badge-danger  { background:rgba(224,92,92,.15);   color:var(--rose); }
    .badge-unknown { background:rgba(138,154,181,.12); color:var(--text-dim); }

    .days-chip { display:inline-block; padding:3px 8px; border-radius:6px; font-size:.74rem; font-weight:600; }
    .days-ok   { background:rgba(62,207,142,.15); color:var(--green); }
    .days-warn { background:rgba(244,168,38,.18);  color:var(--amber); }
    .days-bad  { background:rgba(224,92,92,.15);   color:var(--rose); }

    .action-cell { display:flex; gap:6px; }

    /* Empty/Loading */
    .loading-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; color:var(--text-dim); gap:12px; }
    .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--amber); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .empty-msg { text-align:center; padding:50px 20px; color:var(--text-dim); }
    .empty-msg .emoji { font-size:2.5rem; margin-bottom:10px; }
    .empty-msg p { font-size:.88rem; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset:0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: modalIn .2s ease;
    }
    @keyframes modalIn { from { opacity:0; transform:translateY(12px) scale(.98); } }
    .modal-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:20px 24px; border-bottom:1px solid var(--border);
    }
    .modal-title { font-family:'Syne',sans-serif; font-weight:700; font-size:1.1rem; }
    .modal-close { background:none; border:none; color:var(--text-dim); font-size:1.4rem; cursor:pointer; line-height:1; }
    .modal-close:hover { color:var(--text); }
    .modal-body { padding:24px; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .detail-item label { display:block; font-size:.7rem; letter-spacing:.8px; text-transform:uppercase; color:var(--text-dim); margin-bottom:4px; }
    .detail-item .val { font-size:.88rem; color:var(--text); word-break:break-all; }
    .detail-item.full { grid-column:1/-1; }

    /* Toast */
    #toast { position:fixed; bottom:24px; right:24px; background:var(--navy-soft); border:1px solid var(--border); border-radius:10px; padding:12px 20px; font-size:.85rem; color:var(--text); display:none; z-index:9999; box-shadow:var(--shadow); }

    @media(max-width:900px) { .detail-grid { grid-template-columns:1fr; } }
    @media(max-width:700px) {
      .sidebar { width:60px; }
      .sidebar-logo .brand,.sidebar-logo .tagline,.nav-label,.nav-link span,.sidebar-footer { display:none; }
      .nav-link { justify-content:center; padding:12px; }
      .main { margin-left:60px; padding:20px 14px; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="brand">CertTrack</div>
    <div class="tagline">Renewal Management</div>
  </div>
  <nav class="nav">
    <div class="nav-label">Main</div>
    <a href="index.html" class="nav-link"><span class="icon">📊</span><span>Dashboard</span></a>
    <a href="certificates.html" class="nav-link active"><span class="icon">📋</span><span>Certificates</span></a>
    <a href="add-certificate.html" class="nav-link"><span class="icon">➕</span><span>Add Certificate</span></a>
    <div class="nav-label" style="margin-top:8px">Coming Soon</div>
    <a href="#" class="nav-link" style="opacity:.45;pointer-events:none"><span class="icon">🔄</span><span>Renew</span></a>
    <a href="#" class="nav-link" style="opacity:.45;pointer-events:none"><span class="icon">⚠️</span><span>Expired</span></a>
    <a href="#" class="nav-link" style="opacity:.45;pointer-events:none"><span class="icon">📜</span><span>History</span></a>
  </nav>
  <div class="sidebar-footer">Phase 1 · v1.0</div>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Certificates</div>
      <div class="page-subtitle">All registered company certificates</div>
    </div>
    <a href="add-certificate.html" class="btn btn-primary">➕ Add Certificate</a>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by name, number, responsible person..." oninput="filterTable()"/>
    </div>
    <select class="filter" id="statusFilter" onchange="filterTable()">
      <option value="">All Status</option>
      <option value="Active">Active</option>
      <option value="Expiring Soon">Expiring Soon</option>
      <option value="Expired">Expired</option>
    </select>
    <select class="filter" id="catFilter" onchange="filterTable()">
      <option value="">All Categories</option>
    </select>
    <button class="btn btn-ghost btn-sm" onclick="loadCertificates()">🔄 Refresh</button>
    <span class="result-count" id="resultCount"></span>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-wrap">
      <div id="tableContainer">
        <div class="loading-wrap"><div class="spinner"></div><span>Loading certificates...</span></div>
      </div>
    </div>
  </div>
</main>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Certificate Details</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"; // <-- Paste your Web App URL

  let allCerts = [];
  let sortCol  = "";
  let sortAsc  = true;

  function formatDate(str) {
    if (!str) return "—";
    const d = new Date(str);
    return isNaN(d) ? str : d.toLocaleDateString("en-GB", { day:"2-digit", month:"short", year:"numeric" });
  }

  function daysUntil(str) {
    if (!str) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const exp   = new Date(str); exp.setHours(0,0,0,0);
    return Math.ceil((exp - today) / 86400000);
  }

  function badgeClass(status) {
    if (status === "Active")        return "badge-active";
    if (status === "Expiring Soon") return "badge-warning";
    if (status === "Expired")       return "badge-danger";
    return "badge-unknown";
  }

  function showToast(msg, ok = true) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    t.style.borderColor = ok ? "var(--green)" : "var(--rose)";
    setTimeout(() => { t.style.display = "none"; }, 4000);
  }

  // ── Load ──────────────────────────────────────────────────
  async function loadCertificates() {
    document.getElementById("tableContainer").innerHTML =
      `<div class="loading-wrap"><div class="spinner"></div><span>Loading...</span></div>`;
    try {
      const res  = await fetch(`${API_URL}?action=getCertificates`);
      const data = await res.json();
      if (!data.success) throw new Error(data.error || "Failed to load");
      allCerts = data.data || [];
      populateCategoryFilter();
      renderTable(allCerts);
    } catch (err) {
      document.getElementById("tableContainer").innerHTML =
        `<div class="empty-msg"><div class="emoji">⚠️</div><p>Could not load certificates.<br>${err.message}</p></div>`;
    }
  }

  function populateCategoryFilter() {
    const cats = [...new Set(allCerts.map(c => c["Category"]).filter(Boolean))].sort();
    const sel  = document.getElementById("catFilter");
    sel.innerHTML = `<option value="">All Categories</option>` +
      cats.map(c => `<option value="${c}">${c}</option>`).join("");
  }

  // ── Filter ─────────────────────────────────────────────────
  function filterTable() {
    const q      = document.getElementById("searchInput").value.toLowerCase();
    const status = document.getElementById("statusFilter").value;
    const cat    = document.getElementById("catFilter").value;

    const filtered = allCerts.filter(r => {
      const matchQ = !q || [
        r["Certificate Name"], r["Certificate Number"],
        r["Responsible Person"], r["Issued By"], r["Category"]
      ].some(v => v && String(v).toLowerCase().includes(q));

      const matchS = !status || r["Status"] === status;
      const matchC = !cat    || r["Category"] === cat;
      return matchQ && matchS && matchC;
    });
    renderTable(filtered);
  }

  // ── Sort ───────────────────────────────────────────────────
  function sortBy(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    filterTable();
  }

  // ── Render ─────────────────────────────────────────────────
  function renderTable(rows) {
    document.getElementById("resultCount").textContent =
      `${rows.length} certificate${rows.length !== 1 ? "s" : ""}`;

    if (!rows.length) {
      document.getElementById("tableContainer").innerHTML =
        `<div class="empty-msg"><div class="emoji">📭</div><p>No certificates match your search.</p></div>`;
      return;
    }

    // Sort
    if (sortCol) {
      rows = [...rows].sort((a,b) => {
        let va = a[sortCol] || ""; let vb = b[sortCol] || "";
        if (sortCol === "Expiry Date") { va = new Date(va); vb = new Date(vb); }
        if (va < vb) return sortAsc ? -1 : 1;
        if (va > vb) return sortAsc ?  1 : -1;
        return 0;
      });
    }

    const cols = [
      { label:"Certificate",    key:"Certificate Name",    sort:true },
      { label:"Category",       key:"Category",            sort:true },
      { label:"Cert. Number",   key:"Certificate Number",  sort:false },
      { label:"Expiry Date",    key:"Expiry Date",         sort:true },
      { label:"Days Left",      key:"__days",              sort:false },
      { label:"Status",         key:"Status",              sort:true },
      { label:"Responsible",    key:"Responsible Person",  sort:true },
      { label:"Actions",        key:"__actions",           sort:false }
    ];

    const thead = `<thead><tr>${cols.map(c => {
      const active = sortCol === c.key ? "sorted" : "";
      const icon   = sortCol === c.key ? (sortAsc ? "↑" : "↓") : "↕";
      return `<th class="${active}" ${c.sort ? `onclick="sortBy('${c.key}')"` : ""}>
        ${c.label}${c.sort ? `<span class="sort-icon">${icon}</span>` : ""}
      </th>`;
    }).join("")}</tr></thead>`;

    const tbody = `<tbody>${rows.map(r => {
      const days = daysUntil(r["Expiry Date"]);
      const chipCls = days === null ? "" : days < 0 ? "days-bad" : days <= 30 ? "days-warn" : "days-ok";
      const daysLabel = days === null ? "—" : days < 0 ? "Expired" : days + " days";
      const status    = r["Status"] || "Unknown";
      const docLink   = r["Document Link"]
        ? `<a href="${r["Document Link"]}" target="_blank" class="btn btn-ghost btn-sm" title="Open Document">📎</a>`
        : "";

      return `<tr>
        <td>
          <div class="cert-name">${r["Certificate Name"] || "—"}</div>
          <div class="cert-sub">${r["Issued By"] || ""}</div>
        </td>
        <td>${r["Category"] || "—"}</td>
        <td>${r["Certificate Number"] || "—"}</td>
        <td>${formatDate(r["Expiry Date"])}</td>
        <td><span class="days-chip ${chipCls}">${daysLabel}</span></td>
        <td><span class="badge ${badgeClass(status)}">${status}</span></td>
        <td>
          <div class="cert-name">${r["Responsible Person"] || "—"}</div>
          <div class="cert-sub">${r["Email"] || ""}</div>
        </td>
        <td>
          <div class="action-cell">
            <button class="btn btn-ghost btn-sm" onclick='showDetail(${JSON.stringify(r).replace(/'/g,"&#39;")})'>👁 View</button>
            ${docLink}
          </div>
        </td>
      </tr>`;
    }).join("")}</tbody>`;

    document.getElementById("tableContainer").innerHTML =
      `<table>${thead}${tbody}</table>`;
  }

  // ── Detail Modal ───────────────────────────────────────────
  function showDetail(r) {
    document.getElementById("modalTitle").textContent = r["Certificate Name"] || "Certificate Details";

    const fields = [
      ["Certificate ID",    r["Certificate ID"]],
      ["Category",          r["Category"]],
      ["Certificate Number",r["Certificate Number"]],
      ["Issued By",         r["Issued By"]],
      ["Issue Date",        formatDate(r["Issue Date"])],
      ["Expiry Date",       formatDate(r["Expiry Date"])],
      ["Renewal Frequency", r["Renewal Frequency"]],
      ["Status",            `<span class="badge ${badgeClass(r["Status"])}">${r["Status"] || "Unknown"}</span>`],
      ["Last Renewal Date", formatDate(r["Last Renewal Date"])],
      ["Next Reminder Date",formatDate(r["Next Reminder Date"])],
      ["Responsible Person",r["Responsible Person"]],
      ["Email",             r["Email"] ? `<a href="mailto:${r["Email"]}" style="color:var(--amber)">${r["Email"]}</a>` : "—"],
      ["Phone",             r["Phone"]],
      ["Document Link",     r["Document Link"] ? `<a href="${r["Document Link"]}" target="_blank" style="color:var(--amber)">Open Document 📎</a>` : "—"],
      ["Remarks",           r["Remarks"],  true],
      ["Created Date",      formatDate(r["Created Date"])],
      ["Updated Date",      formatDate(r["Updated Date"])],
    ];

    document.getElementById("modalBody").innerHTML =
      `<div class="detail-grid">${fields.map(([label, val, full]) =>
        `<div class="detail-item${full ? " full" : ""}">
          <label>${label}</label>
          <div class="val">${val || "—"}</div>
        </div>`
      ).join("")}</div>`;

    document.getElementById("detailModal").classList.add("open");
  }

  function closeModal() {
    document.getElementById("detailModal").classList.remove("open");
  }
  document.getElementById("detailModal").addEventListener("click", e => {
    if (e.target === document.getElementById("detailModal")) closeModal();
  });

  // ── Init ───────────────────────────────────────────────────
  loadCertificates();
</script>
</body>
</html>
